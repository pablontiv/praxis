# Go release job using goreleaser — appended to auto-tag job steps
# Requires: goreleaser.yml config in repo root

      - name: Release
        if: steps.version.outputs.bump == 'true'
        uses: goreleaser/goreleaser-action@__GORELEASER_SHA__ # __GORELEASER_TAG__
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
