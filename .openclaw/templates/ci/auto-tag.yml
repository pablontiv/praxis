# Universal auto-tag job — conventional commit → semver
# This template is ecosystem-independent. Paste into CI workflow after quality gates.
#
# Requires: needs: [list-of-quality-gate-jobs]
# Permissions: contents: write, id-token: write, attestations: write

  auto-tag:
    name: Auto Tag
    needs: [{{QUALITY_GATE_JOBS}}]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.version.outputs.bump }}
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@__CHECKOUT_SHA__ # __CHECKOUT_TAG__
        with:
          fetch-depth: 0

      - name: Determine Next Version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --reverse HEAD)
            LAST_TAG="v0.0.0"
          else
            COMMITS=$(git rev-list --reverse "${LAST_TAG}..HEAD")
          fi

          BUMP=""
          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --format=%s "$COMMIT")
            case "$MSG" in
              feat\!*|fix\!*|refactor\!*|perf\!*) BUMP="breaking"; break ;;
              feat*) BUMP="feat" ;;
              fix*|perf*) [ -z "$BUMP" ] && BUMP="fix" ;;
            esac
          done

          if [ -z "$BUMP" ]; then
            echo "No version bump required."
            echo "bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          # Pre-1.0: feat=patch, fix=patch, breaking=minor
          # Post-1.0: feat=minor, fix=patch, breaking=major
          if [ "$MAJOR" -eq 0 ]; then
            case "$BUMP" in
              breaking) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)        PATCH=$((PATCH + 1)) ;;
            esac
          else
            case "$BUMP" in
              breaking) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              feat)     MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)        PATCH=$((PATCH + 1)) ;;
            esac
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          # Guard: skip if tag was already created by a concurrent run
          if git ls-remote --tags origin "refs/tags/$NEXT_TAG" | grep -q .; then
            echo "Tag $NEXT_TAG already exists (concurrent release). Skipping."
            echo "bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Next tag: $NEXT_TAG"
          echo "bump=true" >> $GITHUB_OUTPUT
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT
