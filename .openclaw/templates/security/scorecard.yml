name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [master, main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@__CHECKOUT_SHA__ # __CHECKOUT_VERSION__
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@__SCORECARD_SHA__ # __SCORECARD_VERSION__
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@__CODEQL_SHA__ # __CODEQL_VERSION__
        with:
          sarif_file: results.sarif
