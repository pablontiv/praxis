# Rust release steps — appended to auto-tag job after version determination
# Builds native + static musl binary, attests provenance, creates GitHub release

      - name: Install stable toolchain
        if: steps.version.outputs.bump == 'true'
        uses: dtolnay/rust-toolchain@__RUST_TOOLCHAIN_SHA__ # stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install build tools
        if: steps.version.outputs.bump == 'true'
        run: |
          cargo install cargo-auditable cargo-zigbuild git-cliff
          pip3 install ziglang

      - name: Build Release Binary (native)
        if: steps.version.outputs.bump == 'true'
        run: cargo auditable build --release

      - name: Build Linux musl Static Binary
        if: steps.version.outputs.bump == 'true'
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/{{BINARY_NAME}} {{BINARY_NAME}}-linux-x86_64

      - name: Smoke Test Binary
        if: steps.version.outputs.bump == 'true'
        run: |
          ./{{BINARY_NAME}}-linux-x86_64 --version
          ./{{BINARY_NAME}}-linux-x86_64 --help

      - name: Attest Build Provenance
        if: steps.version.outputs.bump == 'true'
        uses: actions/attest-build-provenance@__ATTEST_SHA__ # __ATTEST_TAG__
        with:
          subject-path: |
            target/release/{{BINARY_NAME}}
            {{BINARY_NAME}}-linux-x86_64

      - name: Generate Changelog
        if: steps.version.outputs.bump == 'true'
        run: git-cliff --latest --strip header --output RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.version.outputs.bump == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            target/release/{{BINARY_NAME}} \
            {{BINARY_NAME}}-linux-x86_64 \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md
